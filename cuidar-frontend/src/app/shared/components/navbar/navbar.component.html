<nav class="bg-[#1a4d32] w-full z-50 py-4 px-6 md:px-12">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-3 no-underline">
      <!-- We use a white/monochrome logo or the default one. For now assuming assets/logo.png -->
      <img src="assets/logo.png" alt="CuidAR" class="h-10 w-auto brightness-0 invert">
      <span class="text-white text-2xl font-bold tracking-wide">CuidAR</span>
    </a>

    <!-- Links (Center) -->
    <div class="hidden md:flex items-center gap-8">
      <a routerLink="/" class="text-white/90 hover:text-white font-medium no-underline transition-colors text-[0.95rem]">Inicio</a>
      <a href="#" class="text-white/70 hover:text-white font-medium no-underline transition-colors text-[0.95rem]">Servicios</a>
      <a href="#" class="text-white/70 hover:text-white font-medium no-underline transition-colors text-[0.95rem]">Nosotros</a>
      <a href="#" class="text-white/70 hover:text-white font-medium no-underline transition-colors text-[0.95rem]">Blog</a>
    </div>

    <!-- Actions (Right) -->
    <div class="flex items-center gap-4">
      <ng-container *ngIf="!isAdminLoggedIn">
        <a routerLink="/formularios/cuidador" class="px-6 py-2 rounded-lg border-2 border-white/30 text-white font-semibold hover:border-white hover:bg-white/10 transition-all no-underline text-sm tracking-wide">
          Registrarse
        </a>
      </ng-container>
      <ng-container *ngIf="isAdminLoggedIn">
        <a routerLink="/admin/panel" class="text-white/90 hover:text-white font-medium no-underline transition-colors mr-3">Panel</a>
        <button class="flex items-center gap-2 px-4 py-2 border border-white/30 rounded-lg text-white hover:bg-white/10 transition-colors" (click)="logout()">

            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>

            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span class="text-sm font-medium">Salir</span>
        </button>
      </ng-container>
    </div>
  </div>
