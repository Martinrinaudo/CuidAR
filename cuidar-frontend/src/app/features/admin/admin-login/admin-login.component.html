<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <h1>Panel de Administración</h1>
      <p>Ingresá tu email para recibir un link de acceso</p>
    </div>

    <div class="mensaje-error" *ngIf="error">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
      {{ error }}
    </div>

    <div class="mensaje-exito" *ngIf="mensajeExito">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      {{ mensajeExito }}
    </div>

    <form class="login-form" (ngSubmit)="login()" *ngIf="!mensajeExito">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="email" 
          placeholder="tu@email.com"
          required
          [disabled]="enviando"
          class="input-email">
      </div>
      <button type="submit" class="btn-primary" [disabled]="enviando || !email">
        {{ enviando ? 'Enviando...' : 'Enviar link de acceso' }}
      </button>
    </form>

    <div class="login-footer">
      <a (click)="volverHome()" class="link-volver">← Volver al inicio</a>
    </div>
  </div>
</div>
