<div class="formulario-container">
  <nav class="form-navbar">
    <div class="form-navbar-inner">
      <a class="form-navbar-brand" routerLink="/">
        <img src="assets/logo.png" alt="CuidAR" width="86" height="70" loading="lazy"><span>CuidAR</span>
      </a>
      <button class="btn-volver" (click)="volver()">← Volver</button>
    </div>
  </nav>
  <div class="form-hero" style="background: linear-gradient(135deg, #b45309, #92400e)">
    <div class="form-hero-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    </div>
    <h1>Registro de Transportista</h1>
    <p>Únete a CuidAR como transportista de adultos mayores</p>
  </div>
  <div class="form-card-wrap">
    <div class="formulario-card">
      <div class="formulario-body">
        <div class="mensaje-exito" *ngIf="mensaje">✓ {{ mensaje }}</div>
        <div class="mensaje-error" *ngIf="error">✗ {{ error }}</div>
        <form [formGroup]="transportistaForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="nombre">Nombre completo *</label>
            <input type="text" id="nombre" formControlName="nombre" placeholder="Ej: Juan Pérez"
              [class.error]="transportistaForm.get('nombre')?.invalid && transportistaForm.get('nombre')?.touched">
            <span class="error-text" *ngIf="transportistaForm.get('nombre')?.invalid && transportistaForm.get('nombre')?.touched">Nombre debe tener al menos 3 caracteres</span>
          </div>
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" formControlName="email" placeholder="ejemplo@email.com"
              [class.error]="transportistaForm.get('email')?.invalid && transportistaForm.get('email')?.touched">
            <span class="error-text" *ngIf="transportistaForm.get('email')?.invalid && transportistaForm.get('email')?.touched">Email inválido</span>
          </div>
          <div class="form-group">
            <label for="telefono">Teléfono *</label>
            <input type="tel" id="telefono" formControlName="telefono" placeholder="Ej: 1134567890"
              [class.error]="transportistaForm.get('telefono')?.invalid && transportistaForm.get('telefono')?.touched">
            <span class="error-text" *ngIf="transportistaForm.get('telefono')?.invalid && transportistaForm.get('telefono')?.touched">Teléfono debe tener 10 dígitos</span>
          </div>
          <div class="form-group">
            <label for="zonaCobertura">Zona de cobertura *</label>
            <input type="text" id="zonaCobertura" formControlName="zonaCobertura" placeholder="Ej: Zona Sur, CABA"
              [class.error]="transportistaForm.get('zonaCobertura')?.invalid && transportistaForm.get('zonaCobertura')?.touched">
            <span class="error-text" *ngIf="transportistaForm.get('zonaCobertura')?.invalid && transportistaForm.get('zonaCobertura')?.touched">Zona de cobertura es requerida</span>
          </div>
          <div class="form-group">
            <label for="tipoVehiculo">Tipo de vehículo *</label>
            <select id="tipoVehiculo" formControlName="tipoVehiculo"
              [class.error]="transportistaForm.get('tipoVehiculo')?.invalid && transportistaForm.get('tipoVehiculo')?.touched">
              <option value="">Seleccioná un tipo</option>
              <option value="Auto">Auto</option>
              <option value="Camioneta">Camioneta</option>
              <option value="Van">Van</option>
              <option value="Ambulancia">Ambulancia</option>
            </select>
            <span class="error-text" *ngIf="transportistaForm.get('tipoVehiculo')?.invalid && transportistaForm.get('tipoVehiculo')?.touched">Tipo de vehículo es requerido</span>
          </div>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" formControlName="aceptaSillaDeRuedas">
              <span>Acepto trasladar personas en silla de ruedas</span>
            </label>
          </div>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" formControlName="aceptaPagoParticular">
              <span>Acepto pago particular</span>
            </label>
          </div>
        </form>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="volver()">Cancelar</button>
        <button type="submit" class="btn-submit" [disabled]="transportistaForm.invalid || enviando" (click)="onSubmit()">
          {{ enviando ? 'Enviando...' : 'Enviar Registro' }}
        </button>
      </div>
    </div>
  </div>
</div>
