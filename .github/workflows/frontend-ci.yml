name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'cuidar-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'cuidar-frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  test-build-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cuidar-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cuidar-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test -- --watch=false

      - name: Build
        run: npm run build

      - name: Security Audit (runtime deps)
        run: npm audit --omit=dev
